name: Backend and Frontend Checks

# Runs the Linux-side backend/frontend quality gate (ruff, pytest, compileall,
# eslint, tsc, vite build) that already exists as a manual step in
# CLAUDE.md/README, but was previously never run in CI. This is deliberately
# a separate workflow from windows-bat-check.yml: that workflow verifies the
# Windows .bat automation on an actual Windows runner (a different concern,
# different runner OS, different failure class - see its own header comment)
# and is left untouched here.
#
# Path filtering happens INSIDE each job (via a diff against the base/before
# commit), not via a top-level `on.pull_request.paths` filter. A top-level
# paths filter would mean the workflow - and therefore the "backend"/
# "frontend" check runs - simply never gets created for PRs that don't touch
# matching files. If either job is later configured as a required status
# check in branch protection, a PR that never triggers it would be blocked
# forever waiting for a check that never appears. Running the job unconditionally
# but skipping its expensive steps keeps the check names ("backend", "frontend")
# stable and always resolved (success) even when there's nothing to check.
#
# The "windows-path-safety" job below follows the same job-internal
# path-diff pattern, but runs on windows-latest and scopes itself to the
# path-safety implementation (app/paths.py, app/scan.py) and its tests.
# backend/frontend never ran on Windows before, so this is the only job
# that can catch junction/NTFS-case-insensitive-specific regressions in
# that code - Linux symlinks and NTFS junctions are detected differently
# by Path.is_symlink(), so the Linux-only backend job cannot substitute
# for this.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine whether backend files changed
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          else
            # workflow_dispatch: no base/head to diff, always run the checks.
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$base" ] || ! git cat-file -e "$base" 2>/dev/null; then
            # New branch's first push, or a base commit this checkout can't
            # see (e.g. history rewrite): fail safe by running the checks.
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$base" "$head" -- backend .github/workflows/backend-frontend-checks.yml | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.changes.outputs.changed == 'true'
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        if: steps.changes.outputs.changed == 'true'
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: ruff
        if: steps.changes.outputs.changed == 'true'
        working-directory: backend
        run: ruff check .

      # pytest is run BOTH as the bare console script and via `python -m
      # pytest`. Historically the bare `pytest` invocation failed with
      # `ModuleNotFoundError: No module named 'app'` because cwd wasn't on
      # sys.path (unlike `python -m pytest`, which adds it automatically) -
      # fixed in pyproject.toml via `pythonpath = ["."]" (see PR #5). Running
      # both here is a regression guard for that specific class of bug: it
      # would be easy to silently reintroduce if only `python -m pytest`
      # were exercised in CI.
      - name: pytest (bare console script)
        if: steps.changes.outputs.changed == 'true'
        working-directory: backend
        run: pytest -q

      - name: python -m pytest
        if: steps.changes.outputs.changed == 'true'
        working-directory: backend
        run: python -m pytest -q

      - name: compileall
        if: steps.changes.outputs.changed == 'true'
        working-directory: backend
        run: python -m compileall -q app

      - name: No backend-relevant changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No changes under backend/ or this workflow file - skipping backend checks."

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine whether frontend files changed
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          else
            # workflow_dispatch: no base/head to diff, always run the checks.
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$base" ] || ! git cat-file -e "$base" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$base" "$head" -- frontend .github/workflows/backend-frontend-checks.yml | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: npm ci

      - name: lint
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: npm run lint

      - name: typecheck
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: npm run typecheck

      # `npm run build` prints an existing, expected chunk-size warning
      # (three.js is large) but still exits 0. Do not treat that warning as
      # a failure condition here.
      - name: build
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: npm run build

      - name: No frontend-relevant changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No changes under frontend/ or this workflow file - skipping frontend checks."

  windows-path-safety:
    name: windows-path-safety
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine whether path-safety files changed
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          else
            # workflow_dispatch: no base/head to diff, always run the checks.
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$base" ] || ! git cat-file -e "$base" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          paths=(
            backend/app/paths.py
            backend/app/scan.py
            backend/app/config.py
            backend/tests/test_paths.py
            backend/tests/test_scan.py
            backend/tests/test_windows_path_safety.py
            backend/pyproject.toml
            backend/requirements.txt
            backend/requirements-dev.txt
            .github/workflows/backend-frontend-checks.yml
          )
          if git diff --name-only "$base" "$head" -- "${paths[@]}" | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.changes.outputs.changed == 'true'
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        if: steps.changes.outputs.changed == 'true'
        working-directory: backend
        run: pip install -r requirements-dev.txt

      # Scoped to the path-safety implementation and its tests, not the
      # full backend suite: this job exists to catch Windows/NTFS-specific
      # regressions (junction handling, case-insensitive path matching),
      # not to duplicate the Linux backend job's broader coverage.
      - name: pytest (path safety, Windows)
        if: steps.changes.outputs.changed == 'true'
        working-directory: backend
        run: python -m pytest -q tests/test_paths.py tests/test_scan.py tests/test_windows_path_safety.py

      - name: No path-safety-relevant changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No changes under path-safety files or this workflow file - skipping windows-path-safety checks."
