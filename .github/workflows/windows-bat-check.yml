name: Windows BAT check

# The Windows .bat scripts under scripts/ and bootstrap_local_site_walk.bat
# repeatedly broke only on real Windows cmd.exe even after passing every
# Linux-based static check - including a bug that only manifests when the
# repository lives at a path containing a space (matching the real default
# clone location, "%USERPROFILE%\.claude\projects\Local Site Walk"). This
# workflow relocates the checkout into a deliberately spaced path and runs
# the scripts themselves on an actual Windows runner, so a genuine
# "'X' is not recognized as an internal or external command" regression is
# caught before merge instead of only being discovered on someone's machine.
#
# Interactive prompts (choice /c YN, pause) are satisfied by piping a
# newline via "echo.|" so each run completes without hanging. Fetching a
# SPECIFIC pull request over the network is intentionally not exercised
# here (a hardcoded PR number would go stale once merged/closed); the
# "cmd /c" self-re-exec mechanism itself (the actual mechanism that broke
# on a spaced path) is instead probed directly and deterministically with
# a small throwaway script, independent of git/network state.

on:
  push:
    paths:
      - "**.bat"
      - "**_message.txt"
      - "scripts/check_windows_scripts.py"
      - ".github/workflows/windows-bat-check.yml"
  pull_request:
    paths:
      - "**.bat"
      - "**_message.txt"
      - "scripts/check_windows_scripts.py"
      - ".github/workflows/windows-bat-check.yml"
  workflow_dispatch:

jobs:
  windows-bat-check:
    runs-on: windows-latest
    env:
      # Deliberately contains a space, matching the real default clone
      # location (%USERPROFILE%\.claude\projects\Local Site Walk), so any
      # bug that only manifests with a spaced path (e.g. cmd /c argument
      # quoting) is actually exercised here instead of passing by accident.
      WORKDIR: 'C:\ci workspace\Local Site Walk'
    defaults:
      run:
        working-directory: 'C:\ci workspace\Local Site Walk'
    steps:
      - uses: actions/checkout@v4
        with:
          path: checkout

      - name: Relocate checkout to a path containing a space
        shell: cmd
        working-directory: ${{ github.workspace }}
        run: |
          mkdir "C:\ci workspace"
          xcopy /E /I /H /Y /Q checkout "%WORKDIR%"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Static audit (ASCII/CRLF/BOM/dangerous commands/self-overwrite guard)
        run: python scripts\check_windows_scripts.py

      - name: diagnose_windows.bat runs without an unrecognized-command error
        shell: cmd
        run: |
          echo.| call scripts\diagnose_windows.bat > out.txt 2>&1
          type out.txt
          findstr /c:"is not recognized" out.txt && exit /b 1
          exit /b 0

      - name: review_pr_windows.bat usage path (no arguments)
        shell: cmd
        run: |
          echo.| call scripts\review_pr_windows.bat > out.txt 2>&1
          type out.txt
          findstr /c:"is not recognized" out.txt && exit /b 1
          exit /b 0

      - name: review_pr_windows.bat invalid PR number path
        shell: cmd
        run: |
          echo.| call scripts\review_pr_windows.bat abc > out.txt 2>&1
          type out.txt
          findstr /c:"is not recognized" out.txt && exit /b 1
          exit /b 0

      - name: update_windows.bat stops on a dirty working tree
        shell: cmd
        run: |
          echo test-only change for CI, discarded below >> README.md
          echo.| call scripts\update_windows.bat > out.txt 2>&1
          type out.txt
          git checkout -- README.md
          findstr /c:"is not recognized" out.txt && exit /b 1
          findstr /c:"Aborted" out.txt || exit /b 1
          exit /b 0

      - name: update_windows.bat runs cleanly on a non-main branch
        shell: cmd
        run: |
          git switch -c ci-update-probe-branch
          (echo N& echo N& echo N)| call scripts\update_windows.bat > out.txt 2>&1
          type out.txt
          findstr /c:"is not recognized" out.txt && exit /b 1
          exit /b 0

      - name: Generate a minimal cmd /c self-re-exec probe
        shell: pwsh
        run: |
          @'
          @echo off
          if "%~1"=="continued" (
              echo REEXEC_OK
              exit /b 0
          )
          cmd /c ""%~f0" continued"
          exit /b %errorlevel%
          '@ | Set-Content -Path reexec_probe.bat -Encoding ascii

      - name: >-
          cmd /c self-re-exec survives a spaced path
          (direct probe of the exact mechanism review_pr_windows.bat /
          update_windows.bat use after "git switch")
        shell: cmd
        run: |
          call reexec_probe.bat > probe_out.txt 2>&1
          type probe_out.txt
          findstr /c:"is not recognized" probe_out.txt && exit /b 1
          findstr /c:"REEXEC_OK" probe_out.txt || exit /b 1
          exit /b 0
